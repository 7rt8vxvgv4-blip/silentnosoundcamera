<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Camera - Fixed Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            background-color: #000; overflow: hidden; 
            touch-action: none; position: fixed; 
            font-family: -apple-system, sans-serif; color: white; 
        }
        
        #video-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 50; }

        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .ui-top { padding: max(env(safe-area-inset-top), 24px) 24px 0 24px; pointer-events: auto; display: flex; justify-content: space-between; }
        .ui-bottom { padding: 0 24px max(env(safe-area-inset-bottom), 32px) 24px; pointer-events: auto; display: flex; justify-content: space-between; align-items: center; }

        .shutter-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; }
        .shutter-inner { width: 64px; height: 64px; background: white; border-radius: 50%; }

        #gallery-thumb { width: 56px; height: 56px; border-radius: 12px; border: 2px solid white; overflow: hidden; background: #222; position: relative; }
        #gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
        #stack-count { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 11px; font-weight: bold; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid black; }

        /* モーダル */
        .modal { position: absolute; inset: 0; width: 100%; height: 100dvh; background: #000; z-index: 100; display: none; flex-direction: column; pointer-events: auto; }
        
        /* ギャラリーグリッド：ここがスクロールの肝 */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 2px; 
            overflow-y: scroll; /* スクロールを強制 */
            -webkit-overflow-scrolling: touch; /* 滑らかスクロール */
            touch-action: pan-y; /* 縦スクロールを許可 */
            padding: 2px; 
            align-content: start;
            flex-grow: 1; /* 余ったスペースをすべて使う */
        }
        
        .grid-item { position: relative; width: 100%; aspect-ratio: 1; background: #111; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .check-icon { position: absolute; bottom: 6px; right: 6px; width: 24px; height: 24px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 2px solid white; font-size: 12px; }

        #preview-modal { z-index: 200; }
        #preview-img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="flash"></div>
</div>

<div class="ui-layer">
    <div class="ui-top">
        <button id="switch-camera" class="p-3 bg-black/40 rounded-full text-white backdrop-blur-md">切替</button>
        <div id="zoom-label" class="bg-black/50 px-4 py-1.5 rounded-full text-sm font-mono text-white">1.0x</div>
    </div>
    
    <div class="ui-bottom">
        <div id="gallery-wrapper" style="visibility: hidden; opacity: 0; pointer-events: none; transition: opacity 0.2s;">
            <div id="gallery-thumb">
                <img id="thumb-img" src="">
                <span id="stack-count">0</span>
            </div>
        </div>
        <button id="shutter" class="shutter-btn"><div class="shutter-inner"></div></button>
        <div style="width: 56px"></div>
    </div>
</div>

<div id="gallery-modal" class="modal">
    <div class="pt-12 pb-4 px-4 flex justify-between items-center bg-zinc-900 shrink-0">
        <button id="close-gallery" class="text-blue-400 font-bold">完了</button>
        <div class="text-center">
            <div class="font-bold text-sm">ギャラリー</div>
            <div id="footer-info" class="text-[10px] text-gray-400">0枚</div>
        </div>
        <button id="toggle-select" class="text-blue-400">選択</button>
    </div>
    
    <div id="select-bar" class="bg-zinc-800 px-4 py-2 flex justify-between items-center hidden shrink-0">
        <button id="select-all-btn" class="text-blue-400 text-sm">全選択</button>
    </div>

    <div id="gallery-grid" class="grid-container"></div>
    
    <div id="gallery-footer" class="pb-8 pt-4 px-8 bg-zinc-900 flex justify-between items-center border-t border-white/10 hidden shrink-0">
        <button id="delete-btn" class="text-red-500 font-bold">削除</button>
        <button id="share-btn" class="text-blue-400 font-bold text-lg">共有・保存</button>
    </div>
</div>

<div id="preview-modal" class="modal">
    <div class="pt-12 pb-4 px-4 flex justify-between items-center bg-black/80 absolute top-0 w-full z-10">
        <button id="close-preview" class="text-white font-bold">戻る</button>
    </div>
    <div class="flex-grow flex items-center justify-center h-full w-full">
        <img id="preview-img" src="">
    </div>
    <div class="pb-8 pt-4 px-8 bg-black/80 flex justify-between items-center absolute bottom-0 w-full z-10">
        <button id="preview-delete-btn" class="text-red-500">削除</button>
        <button id="preview-share-btn" class="text-blue-400 font-bold">保存</button>
    </div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
    const video = document.getElementById('video');
    const flash = document.getElementById('flash');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let photoStack = []; 
    let stream = null;
    let front = false;
    let zoom = 1.0;
    let startDist = 0;
    
    let isSelect = false;
    let selected = new Set();
    let currentPreviewIndex = -1;

    async function init() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: front ? 'user' : 'environment', width: { ideal: 2560 }, height: { ideal: 1440 } }
            });
            video.srcObject = stream;
        } catch (e) { alert("カメラ起動エラー"); }
    }

    // ズーム
    const touchArea = document.getElementById('video-container');
    touchArea.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        }
    }, { passive: false });

    touchArea.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && startDist > 0) {
            e.preventDefault();
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            zoom = Math.min(Math.max(zoom + (dist - startDist) * 0.01, 1), 8);
            video.style.transform = `scale(${zoom})`;
            document.getElementById('zoom-label').innerText = zoom.toFixed(1) + 'x';
            startDist = dist;
        }
    }, { passive: false });

    async function snap() {
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 50);

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        if (front) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        
        const sw = canvas.width / zoom;
        const sh = canvas.height / zoom;
        const sx = (canvas.width - sw) / 2;
        const sy = (canvas.height - sh) / 2;
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        
        photoStack.unshift(canvas.toDataURL('image/jpeg', 0.9));
        updateThumb();
    }

    function updateThumb() {
        const wrapper = document.getElementById('gallery-wrapper');
        if (photoStack.length > 0) {
            wrapper.style.visibility = 'visible';
            wrapper.style.opacity = '1';
            wrapper.style.pointerEvents = 'auto';
            document.getElementById('thumb-img').src = photoStack[0];
            document.getElementById('stack-count').innerText = photoStack.length;
        } else {
            wrapper.style.visibility = 'hidden';
            wrapper.style.opacity = '0';
        }
    }

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        
        photoStack.forEach((src, i) => {
            const isSel = selected.has(i);
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<img src="${src}" loading="lazy">`; // 読み込み負荷を軽減
            
            if (isSelect) {
                if (isSel) {
                    div.innerHTML += `<div class="absolute inset-0 border-4 border-blue-500 bg-blue-500/20"></div><div class="check-icon">✓</div>`;
                } else {
                    div.innerHTML += `<div class="absolute inset-0 bg-black/40"></div>`;
                }
            }

            div.onclick = () => {
                if (isSelect) {
                    isSel ? selected.delete(i) : selected.add(i);
                    renderGallery();
                } else {
                    openPreview(i);
                }
            };
            grid.appendChild(div);
        });

        document.getElementById('toggle-select').innerText = isSelect ? 'キャンセル' : '選択';
        document.getElementById('select-bar').classList.toggle('hidden', !isSelect);
        document.getElementById('gallery-footer').classList.toggle('hidden', !isSelect);
        document.getElementById('footer-info').innerText = isSelect ? `${selected.size}枚選択中` : `${photoStack.length}枚`;
        
        const hasSelection = selected.size > 0;
        document.getElementById('share-btn').style.opacity = hasSelection ? '1' : '0.3';
        document.getElementById('share-btn').style.pointerEvents = hasSelection ? 'auto' : 'none';
        document.getElementById('delete-btn').style.opacity = hasSelection ? '1' : '0.3';
        document.getElementById('delete-btn').style.pointerEvents = hasSelection ? 'auto' : 'none';
        document.getElementById('select-all-btn').innerText = (selected.size === photoStack.length && photoStack.length > 0) ? '解除' : '全選択';
    }

    function openPreview(index) {
        currentPreviewIndex = index;
        document.getElementById('preview-img').src = photoStack[index];
        document.getElementById('preview-modal').style.display = 'flex';
    }

    document.getElementById('close-preview').onclick = () => document.getElementById('preview-modal').style.display = 'none';

    document.getElementById('preview-delete-btn').onclick = () => {
        if (confirm("削除しますか？")) {
            photoStack.splice(currentPreviewIndex, 1);
            updateThumb(); renderGallery();
            document.getElementById('preview-modal').style.display = 'none';
            if (photoStack.length === 0) document.getElementById('gallery-modal').style.display = 'none';
        }
    };

    async function openShare(indices) {
        if (indices.length === 0) return;
        const files = [];
        for (let i of indices) {
            const b = await (await fetch(photoStack[i])).blob();
            files.push(new File([b], `IMG_${i}.jpg`, { type: "image/jpeg" }));
        }
        if (navigator.share) {
            await navigator.share({ files });
            isSelect = false; selected.clear(); renderGallery();
        }
    }

    document.getElementById('shutter').onclick = snap;
    document.getElementById('switch-camera').onclick = () => { front = !front; init(); };
    document.getElementById('gallery-wrapper').onclick = () => { 
        isSelect = false; selected.clear(); renderGallery(); 
        document.getElementById('gallery-modal').style.display = 'flex'; 
    };
    document.getElementById('close-gallery').onclick = () => document.getElementById('gallery-modal').style.display = 'none';
    document.getElementById('toggle-select').onclick = () => { isSelect = !isSelect; selected.clear(); renderGallery(); };
    document.getElementById('select-all-btn').onclick = () => {
        if (selected.size === photoStack.length) selected.clear();
        else photoStack.forEach((_, i) => selected.add(i));
        renderGallery();
    };
    document.getElementById('delete-btn').onclick = () => {
        if (confirm(`${selected.size}枚削除しますか？`)) {
            photoStack = photoStack.filter((_, i) => !selected.has(i));
            selected.clear(); updateThumb(); renderGallery();
            if (photoStack.length === 0) document.getElementById('gallery-modal').style.display = 'none';
        }
    };
    document.getElementById('share-btn').onclick = () => openShare(Array.from(selected));
    document.getElementById('preview-share-btn').onclick = () => openShare([currentPreviewIndex]);

    window.onload = init;
</script>
</body>
</html>
