<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Camera Pro - Full Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; margin: 0; overflow: hidden; height: 100vh; touch-action: none; font-family: -apple-system, sans-serif; }
        #video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        
        /* ビデオプレビュー：ズーム時に中央から拡大 */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }
        
        /* フォーカスリング */
        #focus-ring { position: absolute; width: 70px; height: 70px; border: 2px solid #fbbf24; transform: translate(-50%, -50%) scale(1.5); opacity: 0; transition: transform 0.2s, opacity 0.2s; pointer-events: none; z-index: 40; }
        #focus-ring.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        /* 左下のスタック（サムネイル） */
        #gallery-thumb { position: absolute; left: 20px; bottom: calc(env(safe-area-inset-bottom) + 30px); width: 55px; height: 55px; border-radius: 10px; border: 2px solid white; overflow: hidden; background: #222; z-index: 30; pointer-events: auto; }
        #gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
        #stack-count { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 11px; font-weight: bold; padding: 1px 6px; border-radius: 10px; border: 1px solid black; }

        /* シャッターボタン */
        .shutter-btn { width: 76px; height: 76px; border-radius: 50%; border: 4px solid white; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .shutter-inner { width: 60px; height: 60px; background: white; border-radius: 50%; transition: transform 0.1s; }
        .shutter-btn:active .shutter-inner { transform: scale(0.85); }

        /* 各種モーダル・オーバーレイ */
        .modal { position: fixed; inset: 0; background: black; z-index: 100; display: none; flex-direction: column; }
        #review-overlay { position: fixed; inset: 0; background: black; z-index: 60; display: none; flex-direction: column; }
        #review-img { width: 100%; height: 100%; object-fit: contain; }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex-grow: 1; padding: 2px; align-content: start; }
        .grid-item { position: relative; aspect-ratio: 1; background: #111; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="focus-ring"></div>

    <div class="absolute inset-0 flex flex-col justify-between p-6 pointer-events-none z-10">
        <div class="flex justify-between items-center mt-4">
            <button id="switch-camera" class="p-3 bg-black/50 rounded-full text-white pointer-events-auto">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>
            </button>
            <div id="zoom-label" class="bg-black/60 px-4 py-1 rounded-full text-xs font-mono text-white">1.0x</div>
        </div>
        <div class="flex justify-center items-center mb-10">
            <div id="shutter" class="shutter-btn"><div class="shutter-inner"></div></div>
        </div>
    </div>

    <div id="gallery-thumb" class="hidden">
        <img id="thumb-img" src="">
        <span id="stack-count">0</span>
    </div>
</div>

<div id="review-overlay">
    <div class="flex-grow flex items-center justify-center bg-black">
        <img id="review-img" src="">
    </div>
    <div class="p-8 bg-black/90 flex justify-around items-center border-t border-white/10">
        <button id="retake-btn" class="flex flex-col items-center gap-2">
            <div class="w-14 h-14 rounded-full border border-white/30 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </div>
            <span class="text-xs">撮り直し</span>
        </button>
        <button id="save-confirm-btn" class="flex flex-col items-center gap-2">
            <div class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <span class="text-xs font-bold">保存</span>
        </button>
    </div>
</div>

<div id="gallery-modal" class="modal">
    <div class="p-4 flex justify-between items-center border-b border-white/20 bg-gray-900">
        <button id="close-gallery-btn" class="text-blue-400 font-bold">完了</button>
        <span class="font-bold">ギャラリー</span>
        <button id="toggle-select-btn" class="text-blue-400">選択</button>
    </div>
    <div id="gallery-grid" class="grid-container"></div>
    <div id="gallery-footer" class="p-6 bg-gray-900 flex justify-between border-t border-white/10">
        <button id="delete-btn" class="text-red-500 hidden">選択分を削除</button>
        <button id="batch-save-btn" class="text-blue-400 font-bold hidden">選択分を保存</button>
        <span id="gallery-info" class="text-gray-400 text-sm mx-auto">0枚の写真</span>
    </div>
</div>

<canvas id="hidden-canvas" class="hidden"></canvas>

<script>
    const video = document.getElementById('video');
    const container = document.getElementById('video-container');
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d');
    
    let photoStack = []; 
    let currentStream = null;
    let videoTrack = null;
    let useFrontCamera = false;

    // ズーム設定
    let currentZoom = 1;
    let initialPinchDist = 0;
    const MAX_ZOOM = 8;

    // ギャラリー設定
    let isSelectMode = false;
    let selectedIndices = new Set();

    // 1. カメラ起動
    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: useFrontCamera ? 'user' : 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } }
            });
            video.srcObject = currentStream;
            videoTrack = currentStream.getVideoTracks()[0];
            currentZoom = 1;
            updateZoomUI();
        } catch (e) { alert("カメラを開始できません。設定を確認してください。"); }
    }

    // 2. ピンチズームの実装（iOS/Android両対応）
    container.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        }
    }, { passive: false });

    container.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            e.preventDefault();
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            const diff = (dist - initialPinchDist) * 0.01;
            currentZoom = Math.min(Math.max(currentZoom + diff, 1), MAX_ZOOM);
            updateZoomUI();
            initialPinchDist = dist;
        }
    }, { passive: false });

    function updateZoomUI() {
        video.style.transform = `scale(${currentZoom})`;
        document.getElementById('zoom-label').innerText = `${currentZoom.toFixed(1)}x`;
        // ネイティブズーム対応機種（Androidなど）への適用
        if (videoTrack && videoTrack.getCapabilities().zoom) {
            videoTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] }).catch(() => {});
        }
    }

    // 3. タップフォーカス
    container.addEventListener('click', async (e) => {
        if (e.target.closest('button, #shutter, #gallery-thumb')) return;
        const rect = video.getBoundingClientRect();
        const touchX = (e.clientX - rect.left) / rect.width;
        const touchY = (e.clientY - rect.top) / rect.height;

        const ring = document.getElementById('focus-ring');
        ring.style.left = `${e.clientX}px`; ring.style.top = `${e.clientY}px`;
        ring.classList.remove('active'); void ring.offsetWidth; ring.classList.add('active');
        setTimeout(() => ring.classList.remove('active'), 800);

        if (videoTrack?.applyConstraints) {
            videoTrack.applyConstraints({ advanced: [{ pointsOfInterest: [{x: touchX, y: touchY}], exposureMode: 'continuous', focusMode: 'continuous' }] }).catch(()=>{});
        }
    });

    // 4. 撮影と保存確認
    function takePhoto() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        if (useFrontCamera) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }

        // デジタルズーム分を考慮して描画
        const sw = canvas.width / currentZoom;
        const sh = canvas.height / currentZoom;
        const sx = (canvas.width - sw) / 2;
        const sy = (canvas.height - sh) / 2;
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('review-img').src = dataUrl;
        document.getElementById('review-overlay').style.display = 'flex';
    }

    async function savePhoto() {
        const dataUrl = document.getElementById('review-img').src;
        photoStack.unshift(dataUrl);
        updateGalleryThumb();

        // iPhoneの共有メニューを呼び出す（直接カメラロールへ）
        try {
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], `IMG_${Date.now()}.jpg`, { type: "image/jpeg" });
            if (navigator.share && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file] });
            } else {
                const a = document.createElement('a'); a.href = dataUrl; a.download = `IMG_${Date.now()}.jpg`; a.click();
            }
        } catch (e) { console.error(e); }

        document.getElementById('review-overlay').style.display = 'none';
    }

    function updateGalleryThumb() {
        const thumb = document.getElementById('gallery-thumb');
        if (photoStack.length > 0) {
            thumb.classList.remove('hidden');
            document.getElementById('thumb-img').src = photoStack[0];
            document.getElementById('stack-count').innerText = photoStack.length;
        } else {
            thumb.classList.add('hidden');
        }
    }

    // 5. ギャラリー管理
    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        photoStack.forEach((src, index) => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            const isSelected = selectedIndices.has(index);
            div.innerHTML = `
                <img src="${src}">
                ${isSelectMode ? `<div class="absolute inset-0 border-4 ${isSelected ? 'border-blue-500 bg-blue-500/20' : 'border-transparent'}"></div>` : ''}
            `;
            div.onclick = () => {
                if (isSelectMode) {
                    isSelected ? selectedIndices.delete(index) : selectedIndices.add(index);
                    renderGallery();
                } else {
                    // 単体プレビュー（簡易）
                    const a = document.createElement('a'); a.href = src; a.download = 'photo.jpg'; a.click();
                }
            };
            grid.appendChild(div);
        });
        
        document.getElementById('gallery-info').innerText = isSelectMode ? `${selectedIndices.size}枚を選択中` : `${photoStack.length}枚の写真`;
        document.getElementById('delete-btn').classList.toggle('hidden', !isSelectMode);
        document.getElementById('batch-save-btn').classList.toggle('hidden', !isSelectMode);
    }

    // イベント紐付け
    document.getElementById('shutter').onclick = (e) => { e.stopPropagation(); takePhoto(); };
    document.getElementById('save-confirm-btn').onclick = savePhoto;
    document.getElementById('retake-btn').onclick = () => document.getElementById('review-overlay').style.display = 'none';
    document.getElementById('switch-camera').onclick = (e) => { e.stopPropagation(); useFrontCamera = !useFrontCamera; startCamera(); };
    document.getElementById('gallery-thumb').onclick = (e) => { e.stopPropagation(); renderGallery(); document.getElementById('gallery-modal').style.display = 'flex'; };
    document.getElementById('close-gallery-btn').onclick = () => document.getElementById('gallery-modal').style.display = 'none';
    
    document.getElementById('toggle-select-btn').onclick = (e) => {
        isSelectMode = !isSelectMode;
        selectedIndices.clear();
        e.target.innerText = isSelectMode ? 'キャンセル' : '選択';
        renderGallery();
    };

    document.getElementById('delete-btn').onclick = () => {
        if (confirm('選択した写真を削除しますか？')) {
            photoStack = photoStack.filter((_, i) => !selectedIndices.has(i));
            selectedIndices.clear();
            updateGalleryThumb();
            renderGallery();
        }
    };

    document.getElementById('batch-save-btn').onclick = async () => {
        for (let i of selectedIndices) {
            const a = document.createElement('a'); a.href = photoStack[i]; a.download = `IMG_${i}.jpg`; a.click();
            await new Promise(r => setTimeout(r, 300));
        }
        alert('保存リクエストを送信しました');
    };

    window.onload = startCamera;
</script>
</body>
</html>
