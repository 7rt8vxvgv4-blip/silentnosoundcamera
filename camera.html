<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Camera - Stack Mode v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            touch-action: none; /* ブラウザのズームを防止 */
        }
        #video-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* フォーカスリング：タップした位置に出現 */
        #focus-ring {
            position: absolute;
            width: 70px; 
            height: 70px;
            border: 2px solid #fbbf24;
            transform: translate(-50%, -50%) scale(1.5);
            opacity: 0;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
            pointer-events: none;
            z-index: 40;
        }
        #focus-ring.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        /* 左下のサムネイル */
        #gallery-thumb {
            position: absolute;
            left: 20px;
            bottom: calc(env(safe-area-inset-bottom) + 25px);
            width: 55px;
            height: 55px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.8);
            overflow: hidden;
            background: #222;
            z-index: 30;
            transition: transform 0.1s;
            pointer-events: auto;
        }
        #gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
        #gallery-thumb:active { transform: scale(0.9); }
        #stack-count {
            position: absolute;
            top: -5px; right: -5px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 10px;
            border: 1px solid black;
        }

        /* シャッターボタン */
        .shutter-btn { 
            width: 76px; height: 76px; 
            border-radius: 50%; 
            border: 4px solid white; 
            background: rgba(255,255,255,0.1); 
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        .shutter-inner { 
            width: 60px; height: 60px; 
            background: white; 
            border-radius: 50%; 
            transition: transform 0.1s; 
        }
        .shutter-btn:active .shutter-inner { transform: scale(0.85); }

        /* ギャラリーモーダル */
        #gallery-modal {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            overflow-y: auto;
            padding: 2px;
            flex-grow: 1;
        }
        .grid-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    
    <div id="focus-ring"></div>

    <div id="gallery-thumb" class="hidden">
        <img id="thumb-img" src="">
        <span id="stack-count">0</span>
    </div>

    <div class="absolute inset-0 flex flex-col justify-between p-6 pointer-events-none z-10">
        <div class="flex justify-between items-center mt-4">
            <button id="switch-camera" class="p-3 bg-black/40 rounded-full text-white pointer-events-auto">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>
            </button>
            <div id="zoom-label" class="bg-black/60 px-4 py-1 rounded-full text-xs font-mono text-white">1.0x</div>
        </div>

        <div class="flex justify-center items-center mb-10">
            <div id="shutter" class="shutter-btn">
                <div class="shutter-inner"></div>
            </div>
        </div>
    </div>
</div>

<div id="gallery-modal">
    <div class="p-4 flex justify-between items-center border-b border-white/10">
        <button id="close-gallery-btn" class="text-blue-500 font-bold text-lg">完了</button>
        <span class="font-bold">撮影済み</span>
        <button id="batch-save" class="text-blue-500 font-bold text-lg">保存</button>
    </div>
    <div id="gallery-grid" class="grid-container"></div>
    <div class="p-6 bg-black flex justify-between items-center border-t border-white/10">
        <button id="clear-all-btn" class="text-red-500">すべて消去</button>
        <span id="total-count" class="text-gray-400 text-sm">0枚</span>
    </div>
</div>

<canvas id="hidden-canvas" class="hidden"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('hidden-canvas');
    const shutter = document.getElementById('shutter');
    const galleryThumb = document.getElementById('gallery-thumb');
    const thumbImg = document.getElementById('thumb-img');
    const stackCountEl = document.getElementById('stack-count');
    const galleryModal = document.getElementById('gallery-modal');
    const galleryGrid = document.getElementById('gallery-grid');
    const focusRing = document.getElementById('focus-ring');

    let photoStack = []; 
    let currentStream = null;
    let videoTrack = null;
    let currentZoom = 1;
    let useFrontCamera = false;

    // --- カメラ制御 ---
    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: useFrontCamera ? 'user' : 'environment', 
                    width: { ideal: 3840 }, 
                    height: { ideal: 2160 } 
                }
            });
            video.srcObject = currentStream;
            videoTrack = currentStream.getVideoTracks()[0];
        } catch (e) { alert("カメラの起動に失敗しました。"); }
    }

    // --- 撮影 ---
    function takePhoto() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (useFrontCamera) {
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        photoStack.push(dataUrl);

        // UI更新
        galleryThumb.classList.remove('hidden');
        thumbImg.src = dataUrl;
        stackCountEl.innerText = photoStack.length;

        // 画面フラッシュ演出
        video.style.opacity = "0.3";
        setTimeout(() => video.style.opacity = "1", 80);
    }

    // --- タップフォーカス (修正版) ---
    video.parentElement.addEventListener('click', async (e) => {
        // UI要素(ボタン、サムネイル、シャッター)がクリックされた場合はフォーカス処理をしない
        if (e.target.closest('button, #gallery-thumb, #shutter')) return;

        const rect = video.getBoundingClientRect();
        const touchX = (e.clientX - rect.left) / rect.width;
        const touchY = (e.clientY - rect.top) / rect.height;

        // フォーカスリング表示
        focusRing.style.left = `${e.clientX}px`;
        focusRing.style.top = `${e.clientY}px`;
        focusRing.classList.remove('active');
        void focusRing.offsetWidth; // アニメーション再トリガー
        focusRing.classList.add('active');
        setTimeout(() => focusRing.classList.remove('active'), 800);

        // カメラへの命令
        if (videoTrack && videoTrack.applyConstraints) {
            const caps = videoTrack.getCapabilities();
            const settings = {};
            
            // フォーカスと露出のポイントを設定（対応ブラウザのみ）
            if (caps.focusMode?.includes('continuous')) settings.focusMode = 'continuous';
            if (caps.pointsOfInterest) settings.pointsOfInterest = [{x: touchX, y: touchY}];
            if (caps.exposureMode?.includes('continuous')) settings.exposureMode = 'continuous';

            try {
                await videoTrack.applyConstraints({ advanced: [settings] });
            } catch (err) { console.log("Focus not supported"); }
        }
    });

    // --- 各種ボタンイベント (stopPropagationでフォーカスと干渉させない) ---
    shutter.onclick = (e) => { e.stopPropagation(); takePhoto(); };
    
    document.getElementById('switch-camera').onclick = (e) => { 
        e.stopPropagation(); 
        useFrontCamera = !useFrontCamera; 
        startCamera(); 
    };

    galleryThumb.onclick = (e) => {
        e.stopPropagation();
        galleryGrid.innerHTML = '';
        photoStack.forEach(src => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<img src="${src}">`;
            galleryGrid.appendChild(div);
        });
        document.getElementById('total-count').innerText = `${photoStack.length}枚`;
        galleryModal.style.display = 'flex';
    };

    document.getElementById('close-gallery-btn').onclick = () => galleryModal.style.display = 'none';

    document.getElementById('clear-all-btn').onclick = () => {
        if(confirm("すべて削除しますか？")) {
            photoStack = [];
            galleryThumb.classList.add('hidden');
            galleryModal.style.display = 'none';
        }
    };

    document.getElementById('batch-save').onclick = async () => {
        for (let i = 0; i < photoStack.length; i++) {
            const a = document.createElement('a');
            a.href = photoStack[i];
            a.download = `IMG_${Date.now()}_${i}.jpg`;
            a.click();
            await new Promise(r => setTimeout(r, 300));
        }
        alert("保存が完了しました");
    };

    // --- ピンチズーム ---
    let initialDist = 0;
    video.parentElement.addEventListener('touchstart', e => {
        if (e.touches.length === 2) initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    });
    video.parentElement.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && initialDist) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            const delta = (dist - initialDist) / 100;
            const caps = videoTrack.getCapabilities();
            if (caps.zoom) {
                currentZoom = Math.min(Math.max(currentZoom + delta, caps.minZoom), caps.maxZoom);
                videoTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
                document.getElementById('zoom-label').innerText = `${currentZoom.toFixed(1)}x`;
            }
            initialDist = dist;
        }
    });

    window.onload = startCamera;
</script>

</body>
</html>
