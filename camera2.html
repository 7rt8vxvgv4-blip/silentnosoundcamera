<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Res Silent Camera Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            touch-action: none; /* ブラウザのデフォルトズームを防止 */
        }
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        video, #captured-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            pointer-events: none;
            z-index: 10;
        }
        .controls-overlay * {
            pointer-events: auto;
        }
        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid white;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .shutter-inner {
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 50%;
            transition: transform 0.1s;
        }
        .shutter-btn:active .shutter-inner {
            transform: scale(0.9);
        }
        
        /* フォーカスリングのスタイル */
        #focus-ring {
            position: absolute;
            width: 70px;
            height: 70px;
            border: 2px solid #fbbf24;
            border-radius: 4px;
            transform: translate(-50%, -50%) scale(1.5);
            opacity: 0;
            transition: transform 0.2s ease-out, opacity 0.2s;
            pointer-events: none;
            z-index: 40;
        }
        #focus-ring.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .exposure-slider {
            appearance: none;
            width: 180px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            transform: rotate(-90deg);
            transform-origin: center;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <img id="captured-image" class="hidden" alt="captured">
    <div id="focus-ring"></div>

    <div id="grid" class="absolute inset-0 hidden pointer-events-none">
        <div class="absolute w-[1px] h-full bg-white/30 left-1/3"></div>
        <div class="absolute w-[1px] h-full bg-white/30 left-2/3"></div>
        <div class="absolute h-[1px] w-full bg-white/30 top-1/3"></div>
        <div class="absolute h-[1px] w-full bg-white/30 top-2/3"></div>
    </div>

    <div class="controls-overlay" id="ui-main">
        <div class="flex justify-between items-center mt-4">
            <button id="switch-camera" class="p-3 bg-black/40 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>
            </button>
            <div class="flex gap-2">
                <button id="toggle-grid" class="px-4 py-2 bg-black/40 rounded-full text-xs border border-white/20 uppercase">Grid</button>
                <button id="toggle-timer" class="px-4 py-2 bg-black/40 rounded-full text-xs border border-white/20">TIMER: OFF</button>
            </div>
        </div>

        <div class="absolute right-[-60px] top-1/2 -translate-y-1/2 flex flex-col items-center">
            <input type="range" id="exposure" min="-2" max="2" step="0.1" value="0" class="exposure-slider">
        </div>

        <div class="flex flex-col items-center gap-6 mb-10">
            <div id="zoom-info" class="bg-black/50 px-3 py-1 rounded text-xs font-mono">1.0x</div>
            <div class="flex justify-center items-center w-full">
                <div id="shutter" class="shutter-btn">
                    <div class="shutter-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="post-capture-ui" class="absolute bottom-0 left-0 right-0 p-8 flex justify-around items-center bg-gradient-to-t from-black/80 to-transparent hidden z-20">
        <button id="cancel-btn" class="flex flex-col items-center gap-2">
            <div class="w-14 h-14 bg-white/10 border border-white/30 rounded-full flex items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            <span class="text-xs">撮り直し</span>
        </button>
        <button id="save-btn" class="flex flex-col items-center gap-2">
            <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-black">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <span class="text-xs font-bold text-white">保存</span>
        </button>
    </div>

    <div id="countdown" class="absolute inset-0 flex items-center justify-center text-8xl font-bold pointer-events-none hidden z-30"></div>
</div>

<canvas id="hidden-canvas" class="hidden"></canvas>

<script>
    const video = document.getElementById('video');
    const capturedImage = document.getElementById('captured-image');
    const canvas = document.getElementById('hidden-canvas');
    const uiMain = document.getElementById('ui-main');
    const postUi = document.getElementById('post-capture-ui');
    const shutter = document.getElementById('shutter');
    const focusRing = document.getElementById('focus-ring');
    const zoomInfo = document.getElementById('zoom-info');
    
    let currentStream = null;
    let videoTrack = null;
    let useFrontCamera = false;
    let timerValue = 0;

    // ズーム管理用変数
    let initialPinchDistance = null;
    let currentZoom = 1;
    let minZoom = 1;
    let maxZoom = 1;

    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }

        const constraints = {
            video: {
                facingMode: useFrontCamera ? 'user' : 'environment',
                width: { ideal: 4096 },
                height: { ideal: 2160 }
            }
        };

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            videoTrack = currentStream.getVideoTracks()[0];
            
            const caps = videoTrack.getCapabilities();
            if (caps.zoom) {
                minZoom = caps.minZoom || 1;
                maxZoom = caps.maxZoom || 10;
                currentZoom = minZoom;
            }
        } catch (err) {
            alert("カメラの起動に失敗しました。");
        }
    }

    // --- ピンチズームの実装 ---
    video.parentElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialPinchDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    }, { passive: false });

    video.parentElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialPinchDistance) {
            e.preventDefault();
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            
            const delta = (currentDistance - initialPinchDistance) / 100;
            updateZoom(delta);
            initialPinchDistance = currentDistance;
        }
    }, { passive: false });

    function updateZoom(delta) {
        if (!videoTrack || !('zoom' in videoTrack.getCapabilities())) return;
        
        currentZoom = Math.min(Math.max(currentZoom + delta, minZoom), maxZoom);
        videoTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
        zoomInfo.innerText = `${currentZoom.toFixed(1)}x`;
    }

    // --- タップフォーカスの実装 ---
    video.parentElement.addEventListener('click', (e) => {
        // UI操作時は無視
        if (e.target.closest('button, input')) return;

        const rect = video.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // フォーカスリングの表示
        focusRing.style.left = `${e.clientX}px`;
        focusRing.style.top = `${e.clientY}px`;
        focusRing.classList.add('active');
        setTimeout(() => focusRing.classList.remove('active'), 800);

        // カメラ設定の適用 (Focus/Exposure)
        if (videoTrack && videoTrack.applyConstraints) {
            const constraints = {
                advanced: [
                    { focusMode: 'manual', pointsOfInterest: [{x: x/rect.width, y: y/rect.height}] },
                    { exposureMode: 'manual', pointsOfInterest: [{x: x/rect.width, y: y/rect.height}] }
                ]
            };
            videoTrack.applyConstraints(constraints).catch(() => {
                // 非対応ブラウザ用のフォールバック（ログ出力のみ）
                console.log("Tap-to-focus not fully supported on this device/browser.");
            });
        }
    });

    // --- 撮影・保存ロジック（既存機能の継承） ---
    function capture() {
        if (timerValue > 0) {
            let count = timerValue;
            const countdownEl = document.getElementById('countdown');
            countdownEl.classList.remove('hidden');
            countdownEl.innerText = count;
            const timerId = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timerId);
                    countdownEl.classList.add('hidden');
                    doCapture();
                } else {
                    countdownEl.innerText = count;
                }
            }, 1000);
        } else {
            doCapture();
        }
    }

    function doCapture() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (useFrontCamera) {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        capturedImage.src = canvas.toDataURL('image/jpeg', 0.95);
        
        video.classList.add('hidden');
        capturedImage.classList.remove('hidden');
        uiMain.classList.add('hidden');
        postUi.classList.remove('hidden');
    }

    document.getElementById('save-btn').onclick = () => {
        const link = document.createElement('a');
        link.download = `photo_${Date.now()}.jpg`;
        link.href = capturedImage.src;
        link.click();
        reset();
    };

    function reset() {
        video.classList.remove('hidden');
        capturedImage.classList.add('hidden');
        uiMain.classList.remove('hidden');
        postUi.classList.add('hidden');
    }

    document.getElementById('cancel-btn').onclick = reset;
    document.getElementById('switch-camera').onclick = () => { useFrontCamera = !useFrontCamera; startCamera(); };
    document.getElementById('toggle-grid').onclick = () => document.getElementById('grid').classList.toggle('hidden');
    document.getElementById('toggle-timer').onclick = (e) => {
        const opts = [0, 3, 10];
        timerValue = opts[(opts.indexOf(timerValue) + 1) % opts.length];
        e.target.innerText = timerValue === 0 ? "TIMER: OFF" : `TIMER: ${timerValue}S`;
    };

    document.getElementById('exposure').oninput = (e) => {
        const val = parseFloat(e.target.value);
        video.style.filter = `brightness(${1 + val * 0.4})`;
    };

    shutter.onclick = capture;
    window.onload = startCamera;
</script>

</body>
</html>
